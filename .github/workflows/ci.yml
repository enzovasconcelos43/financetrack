name: CI — Lint e Testes

# Quando este pipeline roda:
# - Em qualquer push para qualquer branch
# - Em Pull Requests direcionados à branch 'main'
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  qualidade:
    name: 🔍 Lint + 🧪 Testes
    runs-on: ubuntu-latest  # Máquina virtual do GitHub (Linux gratuito)

    steps:
      # 1. Baixa o código do repositório para a máquina virtual
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      # 2. Instala o Python 3.11
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala as dependências do projeto
      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Roda o Ruff (linter rápido) para verificar qualidade do código
      - name: 🔍 Lint com Ruff
        run: ruff check .

      # 5. Roda os testes com cobertura de código
      - name: 🧪 Executar Testes com Pytest
        run: pytest test_main.py -v --tb=short

      # 6. (Opcional) Gera relatório de cobertura de código
      - name: 📊 Relatório de Cobertura
        run: pytest test_main.py --cov=main --cov-report=term-missing
